services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: toolkit
      POSTGRES_PASSWORD: toolkit123
      POSTGRES_DB: college_toolkit
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build: ./backend
    command: node src/server.js
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=toolkit
      - DB_PASSWORD=toolkit123
      - DB_NAME=college_toolkit
      - PORT=5000
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
      - FILE_RETENTION_MINUTES=60
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker:
    build: ./backend
    command: node src/worker.js
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=toolkit
      - DB_PASSWORD=toolkit123
      - DB_NAME=college_toolkit
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
      - FILE_RETENTION_MINUTES=60
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
  uploads:
